name: Build and Deploy Production FTP

on:
  push:
    branches:
      - gh-pages
  workflow_dispatch:

jobs:
  build-prod:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm ci

    - name: Run Build Script
      run: npm run build

    - name: Prepare Production FTP build
      run: |
        cp -r ./out ./out-ftp
        sed -i 's|/cv-page/pl/|/pl/|g' ./out-ftp/index.html

    - name: Upload FTP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ftp-dist
        path: ./out-ftp

  deploy-ftp:
    runs-on: ubuntu-latest
    needs: build-prod
    environment:
      name: production

    steps:
    - name: Download FTP Artifact
      uses: actions/download-artifact@v4
      with:
        name: ftp-dist
        path: ./out-ftp

    - name: Deploy to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USER }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        local-dir: ./out-ftp/
        server-dir: /